<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Me - Interactive Puzzle</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #ff6b6b;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header { text-align: center; }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            gap: 5px;
            background: #e9ecef;
            padding: 10px;
            border-radius: 12px;
            user-select: none;
            touch-action: none;
        }
        .cell {
            aspect-ratio: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cell.selected { background: var(--accent); color: white; transform: scale(0.9); }
        .cell.found { background: #51cf66; color: white; }
        
        .hints-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            max-height: 550px;
            overflow-y: auto;
        }
        .hint-item {
            margin-bottom: 12px;
            padding: 10px;
            border-left: 4px solid var(--primary);
            background: white;
            font-size: 0.9rem;
            line-height: 1.4;
            transition: 0.3s;
        }
        .hint-item.completed {
            border-left-color: #51cf66;
            opacity: 0.6;
            text-decoration: line-through;
            background: #f4fce3;
        }
        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
            #grid { grid-template-columns: repeat(15, 25px); overflow-x: auto; }
            .cell { width: 25px; height: 25px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Love Me Puzzle</h1>
        <p>Find the hidden words using the hints below!</p>
    </div>

    <div class="stats-bar">
        <span>Words Found: <span id="found-count">0</span> / 18</span>
        <span>Score: <span id="score">0</span></span>
    </div>

    <div class="main-content">
        <div id="grid"></div>
        <div class="hints-panel">
            <h3>Hints</h3>
            <div id="hint-list"></div>
        </div>
    </div>
</div>

<script>
    const puzzleData = {
        grid: [
            "LFFWQYWNWKHDEFK", "LTRGRATEFULTCOI", "CARINGBMXUKJOOS", "DIOAEPHEONIXODS",
            "CCNFVNFBLSNVKFE", "AQKDMEDAWDDQIVS", "LAWSIJLBVJDGEZN", "ICOMPASSIONATEF",
            "FUMVXUNWJLRXITE", "OPTRMJLAEXOIVNE", "RCWVGXJIUEOVTAL", "NAINHAPPYTTMEEI",
            "IKNGWSELFLESSPN", "AELFFCARAMELTJG", "SMARTRBYAHINCVS"
        ],
        words: {
            "PHOENIX": "Name of the city in the state where you and I met for the first time",
            "CALIFORNIA": "The state where Àdùnní lives, about an hour from Los Angeles",
            "INDIANA": "The state where your friend and dad live",
            "KIND": "What is the act of what you did on your birthday called",
            "SWEET": "Bees produce honey, but my Àdùnní is equally what",
            "FAVORITE": "I often call you my \"_____ person\" during our conversations",
            "SMART": "I often regard you as \"_____\", along with being witty and beautiful",
            "LOVE": "I am in \"_____\" with you",
            "KISSES": "What do you always want a minimum of two from me",
            "HAPPY": "How I feel since I met you",
            "GRATEFUL": "I am \"_____\" to God for bringing you into my life",
            "TWIN": "You once have a \"_____\" sister",
            "CARAMEL": "The nickname of your third nibling is \"_____\"",
            "CUPCAKE": "The nickname of your second nibling is \"_____\"",
            "COOKIE": "The nickname of your first nibling is \"_____\"",
            "FRIEND": "What did you introduce bussy to me as",
            "TRAVEL": "What you said she likes to do a lot, having visited many places",
            "FOOD": "One of the best things you like is exploring new \"_____\""
        }
    };

    let selectedCells = [];
    let isMouseDown = false;
    let score = 0;
    const foundWords = new Set();

    function init() {
        const gridEl = document.getElementById('grid');
        const hintListEl = document.getElementById('hint-list');

        // Build Grid
        puzzleData.grid.forEach((row, r) => {
            row.split('').forEach((char, c) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = char;
                cell.dataset.r = r; cell.dataset.c = c;
                cell.onpointerdown = () => { isMouseDown = true; select(cell); };
                cell.onpointerenter = () => { if(isMouseDown) select(cell); };
                gridEl.appendChild(cell);
            });
        });

        // Build Hints
        Object.entries(puzzleData.words).forEach(([word, hint]) => {
            const item = document.createElement('div');
            item.className = 'hint-item';
            item.id = `hint-${word}`;
            item.textContent = hint;
            hintListEl.appendChild(item);
        });

        window.onpointerup = checkWord;
    }

    function select(cell) {
        if (!cell.classList.contains('found') && !selectedCells.includes(cell)) {
            cell.classList.add('selected');
            selectedCells.push(cell);
        }
    }

    function checkWord() {
        isMouseDown = false;
        const word = selectedCells.map(c => c.textContent).join('');
        const revWord = word.split('').reverse().join('');
        const match = puzzleData.words[word] ? word : (puzzleData.words[revWord] ? revWord : null);

        if (match && !foundWords.has(match)) {
            selectedCells.forEach(c => { c.classList.remove('selected'); c.classList.add('found'); });
            foundWords.add(match);
            document.getElementById(`hint-${match}`).classList.add('completed');
            score += 100;
            document.getElementById('score').textContent = score;
            document.getElementById('found-count').textContent = foundWords.size;
        } else {
            selectedCells.forEach(c => c.classList.remove('selected'));
        }
        selectedCells = [];
    }

    init();
</script>
</body>
</html>
